name: Minify and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Minifiers
        run: npm install -g clean-css-cli terser html-minifier

      - name: Minify Process
        run: |
          mkdir dist
          # Copy semua file & folder ke dist (biar struktur tetep sama)
          cp -r * dist/ 2>/dev/null || true
          # Hapus folder .github dari dist biar gak ikut ke-deploy
          rm -rf dist/.github

          # Minify semua file yang ketemu di dalem dist
          find dist -name "*.css" -exec cleancss -o {} {} \;
          find dist -name "*.js" -exec terser {} -o {} \;
          find dist -name "*.html" -exec html-minifier --collapse-whitespace --remove-comments --minify-js true --minify-css true -o {} {} \;

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
